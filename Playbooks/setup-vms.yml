- name: Installation automatique des clients Debian
  hosts: HOSTNAME
  become: true

  vars:
    zabbix_server_ip: "100.x.x.x"   # Adresse Tailscale du serveur Zabbix

  tasks:
    - name: Mettre a jour le cache apt
      apt:
        update_cache: true

    - name: Installer les paquets de base
      apt:
        name:
          - curl
          - vim
          - htop
          - openssh-server
          - ca-certificates
          - gnupg
          - lsb-release
        state: present

    - name: S'assurer que SSH est actif
      service:
        name: ssh
        state: started
        enabled: true

    - name: Installer Tailscale
      shell: curl -fsSL https://tailscale.com/install.sh | sh
      args:
        creates: /usr/bin/tailscale

    - name: S'assurer que le service Tailscale est actif
      service:
        name: tailscaled
        state: started
        enabled: true

    - name: Installer Zabbix Agent
      apt:
        name: zabbix-agent
        state: present
        update_cache: true

    - name: Configurer l'adresse du serveur Zabbix
      lineinfile:
        path: /etc/zabbix/zabbix_agentd.conf
        regexp: '^Server='
        line: "Server={{ zabbix_server_ip }}"

    - name: Configurer ServerActive pour Zabbix
      lineinfile:
        path: /etc/zabbix/zabbix_agentd.conf
        regexp: '^ServerActive='
        line: "ServerActive={{ zabbix_server_ip }}"

    - name: Configurer le Hostname de l'agent Zabbix
      lineinfile:
        path: /etc/zabbix/zabbix_agentd.conf
        regexp: '^Hostname='
        line: "Hostname={{ inventory_hostname }}"

    - name: Redemarrer et activer Zabbix Agent
      service:
        name: zabbix-agent
        state: restarted
        enabled: true
