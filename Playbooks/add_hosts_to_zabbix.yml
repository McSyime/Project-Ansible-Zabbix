---
- name: Ajouter les hosts Ansible dans Zabbix
  hosts: localhost
  gather_facts: false

  vars:
    zabbix_server_ip: "100.75.102.123"
    zabbix_http_port: 8080
    zabbix_api_url_path: ""
    zabbix_api_token: "YOUR_ZABBIX_TOKEN"

    ansible_connection: httpapi
    ansible_network_os: community.zabbix.zabbix
    ansible_httpapi_host: "{{ zabbix_server_ip }}"
    ansible_httpapi_port: "{{ zabbix_http_port }}"
    ansible_httpapi_use_ssl: false
    ansible_httpapi_validate_certs: false
    ansible_zabbix_url_path: "{{ zabbix_api_url_path }}"
    ansible_zabbix_auth_key: "{{ zabbix_api_token }}"

  tasks:
    - name: Créer ou mettre à jour les hosts dans Zabbix
      community.zabbix.zabbix_host:
        host_name: "{{ item }}"
        visible_name: "{{ item }}"
        host_groups:
          - "Virtual machines"
        link_templates:
          - "Linux by Zabbix agent"
        status: enabled
        interfaces:
          - type: agent
            main: 1
            useip: 1
            ip: "{{ hostvars[item].ansible_host }}"
            dns: ""
            port: "10050"
        state: present
      loop: "{{ groups['YOUR_GROUP_IN_INVENTORY.INI'] }}"
